<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afghanistan Provinces Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Afghanistan Provinces Game</h1>
            <div class="game-info">
                <div class="score">
                    <span id="score-text">0/34 Provinces Correct</span>
                </div>
                <div class="timer">
                    <span id="timer">Time: 00:00</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                <div class="input-area">
                    <input type="text" id="provinceInput" placeholder="Enter province name..." autocomplete="off">
                    <button id="submitBtn">Submit</button>
                    <button id="exitBtn">Exit Game</button>
                </div>
                <div id="feedback" class="feedback"></div>
            </div>
        </main>

        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2 id="gameOverTitle">Game Over!</h2>
                <p id="gameOverMessage"></p>
                <button id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
